version: "3.9"

services:
  api:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - aiden_data:/app/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/status"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  web-ui:
    build:
      context: .
      dockerfile: Dockerfile.web
    ports:
      - "8501:8501"
    environment:
      - AIDEN_API_URL=http://api:8000/api/v1
    depends_on:
      api:
        condition: service_healthy
    volumes:
      - aiden_data:/app/data

volumes:
  aiden_data:
